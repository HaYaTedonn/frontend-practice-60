<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>class と id</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 id="main-title">重要なお知らせ</h1>

  <p class="notice">これは <span class="important">重要</span> な通知です。</p>
  <p>普通の段落です。特に装飾はありません。</p>
  <p class="notice">もう一つの <span class="important">重要</span> な通知です。</p>
</body>
</html>
