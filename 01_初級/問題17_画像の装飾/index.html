<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像の装飾</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>画像に装飾をつけよう</h1>
  <div class="gallery">
    <img class="img-round"  src="https://placehold.jp/300x300.png" alt="角丸">
    <img class="img-circle" src="https://placehold.jp/300x300.png" alt="円形">
    <img class="img-filter" src="https://placehold.jp/300x300.png" alt="モノクロ→カラー">
  </div>
</body>
</html>
