<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スライダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider">
    <img class="slide" src="https://placehold.jp/f87171/ffffff/600x300.png?text=Slide+1" alt="スライド1">
    <img class="slide" src="https://placehold.jp/34d399/ffffff/600x300.png?text=Slide+2" alt="スライド2" hidden>
    <img class="slide" src="https://placehold.jp/60a5fa/ffffff/600x300.png?text=Slide+3" alt="スライド3" hidden>

    <div class="controls">
      <button id="prev">前へ</button>
      <span id="counter">1 / 3</span>
      <button id="next">次へ</button>
    </div>

    <div class="dots">
      <span class="dot active" data-idx="0"></span>
      <span class="dot" data-idx="1"></span>
      <span class="dot" data-idx="2"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
