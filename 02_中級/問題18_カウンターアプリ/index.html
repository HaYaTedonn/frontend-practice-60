<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>カウンター</h1>
  <div class="counter">
    <div id="display">0</div>
    <div class="buttons">
      <button id="dec">-</button>
      <button id="reset">リセット</button>
      <button id="inc">+</button>
    </div>
    <p class="hint">キーボード: ↑↓でカウント / R でリセット</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
