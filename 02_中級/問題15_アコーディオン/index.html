<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アコーディオン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>よくある質問</h1>
  <div class="accordion">
    <div class="accordion-item">
      <button class="question">配送にはどれくらいかかりますか？ <span class="arrow">▼</span></button>
      <div class="answer">通常、ご注文から 3〜5 営業日でお届けしています。</div>
    </div>
    <div class="accordion-item">
      <button class="question">返品はできますか？ <span class="arrow">▼</span></button>
      <div class="answer">未使用・未開封の商品に限り、7日以内であれば返品を承ります。</div>
    </div>
    <div class="accordion-item">
      <button class="question">支払方法は？ <span class="arrow">▼</span></button>
      <div class="answer">クレジットカード、銀行振込、代金引換に対応しています。</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
