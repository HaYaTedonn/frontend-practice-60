<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>style プロパティ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>文字をカスタマイズ</h1>

  <label>文字サイズ: <input type="range" id="sizeRange" min="10" max="60" value="20"></label>
  <label>文字色: <input type="color" id="colorPicker" value="#000000"></label>
  <button id="boldBtn">太字トグル</button>

  <p class="target">この文字をカスタマイズしよう！</p>

  <script src="script.js"></script>
</body>
</html>
