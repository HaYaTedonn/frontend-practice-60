<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ソート可能テーブル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>成績表</h1>
  <table id="table">
    <thead>
      <tr>
        <th data-key="name">名前 <span class="arrow"></span></th>
        <th data-key="age">年齢 <span class="arrow"></span></th>
        <th data-key="score">得点 <span class="arrow"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
