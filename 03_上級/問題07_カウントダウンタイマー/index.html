<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウントダウン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>カウントダウンタイマー</h1>
  <div class="inputs">
    <label>分: <input type="number" id="min" value="0" min="0" max="59"></label>
    <label>秒: <input type="number" id="sec" value="10" min="0" max="59"></label>
  </div>
  <div id="display">00:10</div>
  <div class="buttons">
    <button id="start">開始</button>
    <button id="pause">一時停止</button>
    <button id="reset">リセット</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
